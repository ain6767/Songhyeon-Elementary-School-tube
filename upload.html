<!DOCTYPE html>
<html>
<head>
  <title>영상 업로드</title>
</head>
<body>
  <h1>영상 업로드 🎬</h1>

  <input id="channel" placeholder="채널 이름"><br><br>
  <input id="title" placeholder="영상 제목"><br><br>
  <input type="file" id="file"><br><br>

  <button onclick="upload()">업로드</button>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];
  const title = document.getElementById("title").value;
  const channel = document.getElementById("channel").value;

  if(!file || !title || !channel) return alert("다 입력해라");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "mytube");

  const res = await fetch("https://api.cloudinary.com/v1_1/dchfip45v/video/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  let videos = JSON.parse(localStorage.getItem("mytube_videos") || "[]");

  videos.push({
    url: data.secure_url,
    title: title,
    channel: channel,
    likes: 0,
    comments: []
  });

  localStorage.setItem("mytube_videos", JSON.stringify(videos));

  alert("업로드 완료!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
