<!DOCTYPE html>
<html>
<head>
  <title>영상 업로드</title>
</head>
<body>
  <h1>영상 업로드 🎥</h1>

  <input type="file" id="videoFile">
  <button onclick="uploadVideo()">업로드</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbUfovifvrl3o1GYAOkxuT-abpGFHvtPc",
  authDomain: "mytube-54551.firebaseapp.com",
  projectId: "mytube-54551",
  storageBucket: "mytube-54551.firebasestorage.app",
  messagingSenderId: "687914851963",
  appId: "1:687914851963:web:8697c270248d1825934cde"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

window.uploadVideo = async function() {
  const file = document.getElementById("videoFile").files[0];
  if (!file) return alert("영상 선택해!!");

  const storageRef = ref(storage, "videos/" + file.name);

  alert("업로드 시작...");
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "videos"), {
    url: url
  });

  alert("업로드 완료!! 🎉");
}
</script>
</body>
</html>
