<!DOCTYPE html>
<html>
<head>
  <title>영상 업로드</title>
</head>
<body>
  <h1>영상 업로드</h1>

  <input type="file" id="videoFile">
  <br><br>
  <button id="uploadBtn">업로드</button>

  <script>
    document.getElementById("uploadBtn").onclick = async function () {
      const file = document.getElementById("videoFile").files[0];

      if (!file) {
        alert("파일 선택 먼저!");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "mytube");

      const response = await fetch("https://api.cloudinary.com/v1_1/dchfip45v/video/upload", {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      console.log(data);
      alert("업로드 완료 🎉");
    };
  </script>

</body>
</html>
