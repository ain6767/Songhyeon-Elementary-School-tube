<!DOCTYPE html>
<html>
<head>
  <title>영상 업로드</title>
</head>
<body>
  <h1>영상 업로드 🎬</h1>

  <input type="file" id="file">
  <button onclick="upload()">업로드</button>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];
  if(!file) return alert("파일 선택 ㄱ");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "mytube");

  const res = await fetch("https://api.cloudinary.com/v1_1/dchfip45v/video/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  const videoURL = data.secure_url;

  // 영상 목록 저장
  let videos = JSON.parse(localStorage.getItem("mytube_videos") || "[]");
  videos.push(videoURL);
  localStorage.setItem("mytube_videos", JSON.stringify(videos));

  alert("업로드 완료!! 🎉");

  // 메인페이지로 이동
  window.location.href = "index.html";
}
</script>

</body>
</html>
